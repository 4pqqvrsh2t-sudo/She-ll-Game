<!DOCTYPE html>
<html>
<head>
    <title>Shell Designer v0.3.1</title>
</head>
<body>

<h1>Shell Designer – Phase 3.5</h1>

<div id="request">Order will appear here</div>
<button onclick="generateOrder()">New Order</button>

<h2>Request</h2>

<h2>Current Build</h2>
<p id="build"></p>

<h2>Stats</h2>
<p id="stats"></p>

<h2>Choose Core</h2>
<button onclick="selectCore('heavy')" id="heavyCoreBtn">Heavy Core</button>
<button onclick="selectCore('light')" id="lightCoreBtn">Light Core</button>

<h2>Choose Casing</h2>
<button onclick="selectCasing('reinforced')" id="reinforcedCasingBtn">Reinforced</button>
<button onclick="selectCasing('cheap')" id="cheapCasingBtn">Cheap</button>

<h2>Choose Powder</h2>
<button onclick="selectPowder('fast')" id="fastPowderBtn">Fast Burn</button>
<button onclick="selectPowder('stable')" id="stablePowderBtn">Stable Burn</button>

<h2>Research</h2>
<button onclick="testShell()">Test Shell</button>
<p id="testResult"></p>

<h2>Recover New Armor Sample</h2>
<button onclick="getNewArmor()">Recover New Armor Sample</button>
<br><br>
<button onclick="submitDesign()">Submit Design</button>

<h2 id="result"></h2>

<script>

const orderDescriptions = [
    "Frontline Report: Enemy armor is Reinforced.",
    "Frontline Report: Enemy vehicles are Lightly Armored and Agile.",
    "Frontline Report: New Enemy plating detected, adjust accordingly.",
    "Central Command: We need a shell that can withstand High Impact but is Cost-Effective.",
    "Central Command: We need an all-rounder shell that can handle various combat scenarios. Keep the cost Low.",
    "Central Command: We need a shell that can deliver high power but is stable enough for Long-Range engagements.",
    "Central Command: We need a shell that can deliver high power but is Cost-Effective for mass production."
];
// Min & Max ranges for each stat
const powerMin = 5, powerMax = 9;
const costMin = 4, costMax = 8;
const stabilityMin = 1, stabilityMax = 3;

// Variables to hold current order
let isWaiting = false;
let requiredPower;
let maxCost;
let requiredStability;
// Remembering Failed Orders
let failedOrders = []; //Store failed Orders
let orderSinceLastFailure = 0; // Track Orders since last failed one
let currentOrderDescription = ""; // Store the current order text

// Current parts
let core = null;
let casing = null;
let powder = null;

// Stats
let power = 0;
let cost = 0;
let stability = 0;

//Testing System
let currentArmor ="Armor A";
let armorDurability = 4;

//Knowledge system( What the player has learned about the enemy armor)
let knownStats = {
    core: {
        heavy: {},
        light: {}
    },
    casing: {
        reinforced: {},
        cheap: {}
    },
    powder: {
        fast: {},
        stable: {}
    }
};

// Alternative version that shows all armors with ??? for unknown ones
function getKnownStatText(partType, partName) {
    let text = "";
    let armors = ["Armor A", "Armor B", "Armor C"];
    armors.forEach((armor, i) => {
        if (knownStats[partType][partName] && knownStats[partType][partName][armor] !== undefined) {
            text += armor + ": " + knownStats[partType][partName][armor];
        } else {
            text += armor + ": ???";
        }
        if (i < armors.length - 1) text += " | ";
    });
    return text;
}

// Update tooltips with known stats
function updateTooltip() {
   document.getElementById("heavyCoreBtn").title = getKnownStatText("core", "heavy");
   document.getElementById("lightCoreBtn").title = getKnownStatText("core", "light");
   document.getElementById("reinforcedCasingBtn").title = getKnownStatText("casing", "reinforced");
   document.getElementById("cheapCasingBtn").title = getKnownStatText("casing", "cheap");
   document.getElementById("fastPowderBtn").title = getKnownStatText("powder", "fast");
   document.getElementById("stablePowderBtn").title = getKnownStatText("powder", "stable");
}

function calculateArmorStats(core, casing, powder, armor) {
    //multipliers for each armor type
    let armorMultiplier = {
        "Armor A": 1.0,
        "Armor B": 0.5,
        "Armor C": 1.5
    };
    return {
        power: Math.round(coreStats[core].power + powderStats[powder].power * armorMultiplier[armor]),
        cost: Math.round(coreStats[core].cost + casingStats[casing].cost + powderStats[powder].cost),
        stability: Math.round(casingStats[casing].stability * armorMultiplier[armor])
    };
}
// Function to test the shell against the current armor
function testShell() {
    if (!core || !casing || !powder) {
        document.getElementById("testResult").innerText = "Incomplete shell!";
        return;
    }
    if (armorDurability <= 0) {
        document.getElementById("testResult").innerText = "Armor has been spent. Recover a new sample to continue testing.";
        return;
    }
    armorDurability--;
    //Caculate the actual stats of the shell against the current armor
    let actualStats = calculateArmorStats(core, casing, powder, currentArmor);


    //Store Knowledge for this part and armor
   knownStats.core[core][currentArmor] = actualStats.power;
   knownStats.casing[casing][currentArmor] = actualStats.stability;
   knownStats.powder[powder][currentArmor] = actualStats.power;
   knownStats.core[core][currentArmor] = { power:actualStats.power, cost:actualStats.cost };
   //NULL REGION
  // knownStats.core[core] = knownStats.core[core] || {};
  // knownStats.core[core][currentArmor] = power;
  //  knownStats.casing[casing] = knownStats.casing[casing] || {};
  //  knownStats.casing[casing][currentArmor] = stability;
  //  knownStats.powder[powder] = knownStats.powder[powder] || {};
  //  knownStats.powder[powder][currentArmor] = power;
  //Show results of the test
  let resultText = 'Testing Results on ${currentArmor}:\nPower: | Cost: ${actualStats.cost} | Stability: ${actualStats.stability}\nDurability Left: ${armorDurability}';
    document.getElementById("testResult").innerText = resultText;

    updateDisplay();
    updateTooltip();
}

// Function to recover a new armor sample
function getNewArmor() {
    let armorTypes = ["Armor A", "Armor B", "Armor C"];
    currentArmor = armorTypes[Math.floor(Math.random() * armorTypes.length)];
    armorDurability = 4; // Reset durability for new armor

    document.getElementById("testResult").innerText = "New Armor Sample Recovered: " + currentArmor;
}

// Function to generate a new order
function generateOrder() {
    if (isWaiting) return; // Prevent generating a new order while waiting for the next one

    orderSinceLastFailure++; // Increment counter for orders since last failure
    let useFailedOrder = false;
let description;
    
    if (failedOrders.length > 0 && orderSinceLastFailure >= 3) {
        useFailedOrder = Math.random() < 0.5; // 50% chance to reuse a failed order
    }

    if (useFailedOrder) {
            // Pick a random failed order
            let index = Math.floor(Math.random() * failedOrders.length);
            let order = failedOrders[index];

            description = "Central Command: The previous shells were ineffective." + order.description;

            requiredPower = order.requiredPower;
            maxCost = order.maxCost;
            requiredStability = order.requiredStability;
            
            failedOrders.splice(index, 1); // Remove from memory
            orderSinceLastFailure = 0; // Reset counter after using a failed order
            currentOrderDescription = description;
            document.getElementById("request").innerText =
                "Reattempting Failed Order:\n" + currentOrderDescription + "\n\n" +
                "Power ≥ " + requiredPower +
                " | Cost ≤ " + maxCost +
                " | Stability ≥ " + requiredStability;
            orderSinceLastFailure = 0; // Reset counter after using a failed order
        } else {
        
    // Base stats for the order
    let pMin = 5, pMax = 9;
    let cMin = 4, cMax = 8;
    let sMin = 1, sMax = 3;
    
    // Randomly chose a description
    let description = orderDescriptions[Math.floor(Math.random() * orderDescriptions.length)];

    //Keywords in description that adjust the stat requirements
    if(description.includes("Reinforced") || description.includes("Heavily armored")) {
        pMin += 2; 
        pMax += 2; // Increase power requirement for reinforced armor
    }
    if(description.includes("Lightly Armored") || description.includes("Soft targets") || description.includes("Weak armor")) {
        pMin -= 2; 
        pMax -= 2; // Decrease power requirement for lightly armored targets
    }
    if(description.includes("Cost-Effective") || description.includes("Low")) {
        cMin -= 2; 
        cMax -= 2; // Decrease cost requirement for cost-effective orders
    }
    if(description.includes("Stable") || description.includes("Wont break") || description.includes("Wont shatter") || description.includes("High Impact")) {
        sMin += 1; 
        sMax += 1; // Increase stability requirement for stable/long-range orders
    }
    requiredPower = Math.floor(Math.random() * (pMax - pMin + 1)) + pMin;
    maxCost = Math.floor(Math.random() * (cMax - cMin + 1)) + cMin;
    requiredStability = Math.floor(Math.random() * (stabilityMax - stabilityMin + 1)) + stabilityMin;

    // Clamp values to ensure they stay within reasonable bounds
    pMin = Math.max(0, pMin); pMax = Math.max(pMin, pMax);
    cMin = Math.max(0, cMin); cMax = Math.max(cMin, cMax);
    sMin = Math.max(0, sMin); sMax = Math.max(sMin, sMax);

    requiredPower = Math.floor(Math.random() * (pMax - pMin + 1)) + pMin;
    maxCost = Math.floor(Math.random() * (cMax - cMin + 1)) + cMin;
    requiredStability = Math.floor(Math.random() * (sMax - sMin + 1)) + sMin;

    currentOrderDescription = description;

    //Pick a random description for the order
    document.getElementById("request").innerText =
    description + "\n\n" +
        "Power ≥ " + requiredPower +
        " | Cost ≤ " + maxCost +
        " | Stability ≥ " + requiredStability;
    }
}

// Call once at start to generate the first order
generateOrder();

// Stats for each part
const coreStats = {
    heavy: {power:5, cost:3, stability:0},
    light: {power:2, cost:1, stability:0}
};

const casingStats = {
    reinforced: {power:0, cost:2, stability:4},
    cheap: {power:0, cost:1, stability:-1}
};

const powderStats = {
    fast: {power:3, cost:0, stability:-2},
    stable: {power:1, cost:0, stability:3}
};

// Helper to clamp stats >= 0
function clampStats() {
    power = Math.max(0, power);
    cost = Math.max(0, cost);
    stability = Math.max(0, stability);
}

// Update display
function updateDisplay() {
    document.getElementById("build").innerText =
        "Core: " + (core ? core : "None") +
        " | Casing: " + (casing ? casing : "None") +
        " | Powder: " + (powder ? powder : "None");

    document.getElementById("stats").innerText =
        "Core Info: " + (core ? getKnownStatText("core", core) : "None") + "\n" +
        "Casing Info: " + (casing ? getKnownStatText("casing", casing) : "None") + "\n" +
        "Powder Info: " + (powder ? getKnownStatText("powder", powder) : "None");
}

// Core selection
function selectCore(type) {
    // Remove old stats
    if(core) {
        power -= coreStats[core].power;
        cost -= coreStats[core].cost;
        stability -= coreStats[core].stability;
    }

    // Assign new core
    core = type;

    // Add new stats
    power += coreStats[type].power;
    cost += coreStats[type].cost;
    stability += coreStats[type].stability;

    clampStats();
    updateDisplay();
}

// Casing selection
function selectCasing(type) {
    if(casing) {
        power -= casingStats[casing].power;
        cost -= casingStats[casing].cost;
        stability -= casingStats[casing].stability;
    }

    casing = type;

    power += casingStats[type].power;
    cost += casingStats[type].cost;
    stability += casingStats[type].stability;

    clampStats();
    updateDisplay();
}

// Powder selection
function selectPowder(type) {
    if(powder) {
        power -= powderStats[powder].power;
        cost -= powderStats[powder].cost;
        stability -= powderStats[powder].stability;
    }

    powder = type;

    power += powderStats[type].power;
    cost += powderStats[type].cost;
    stability += powderStats[type].stability;

    clampStats();
    updateDisplay();
}

// Submit design
function submitDesign() {
    if (isWaiting) return; // Prevent multiple submissions while waiting for the next order

    isWaiting = true; // Set waiting state to prevent new orders until the next one is generated

    let failures = [];
    // Check each requirement and collect failure reasons
    if (power < requiredPower) {
        failures.push("Not enough power.");
    }
    if (cost > maxCost) {
        failures.push("Too expensive.");
    }
    if (stability < requiredStability) {
        failures.push("Shell Stability is too low.");
    }
    if (failures.length > 0) {
        // Store failed order details for potential reuse
        failedOrders.push({
            description: currentOrderDescription,
            requiredPower,
            maxCost,
            requiredStability
        });
        orderSinceLastFailure = 0; // Reset counter on failure
    }
    // Display result
    if (failures.length === 0) {
        document.getElementById("result").innerText = "Order Fulfilled! Great job!";
    } else {
        document.getElementById("result").innerText = "Order requirements not met:\n" + failures.join("\n");
    }
    setTimeout( () => {
        generateOrder();
        isWaiting = false; // Reset waiting state to allow new orders
    }, 1000); // Creates a new order after a 1-second delay after submission
}

updateDisplay();
updateTooltip();
</script>

</body>
</html>
